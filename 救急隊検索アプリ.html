<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>救急隊 検索</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1c2530; --sub:#5b6b7b; --line:#e3e8ee;
    --hokusei:#2f6fb0; --kyodo:#3f9a55; --funabashi:#c79100; --ibaraki:#cf6b3a;
    --accent:#1f4e78;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
       background:var(--bg);color:var(--ink);}
  .wrap{max-width:680px;margin:0 auto;padding:0 14px 40px;}
  header{position:sticky;top:0;z-index:10;background:var(--bg);padding:14px 14px 8px;
         max-width:680px;margin:0 auto;}
  h1{font-size:17px;margin:0 0 10px;font-weight:700;letter-spacing:.02em;}
  h1 .cnt{font-size:12px;color:var(--sub);font-weight:500;margin-left:6px;}
  .searchbox{position:relative;}
  .searchbox input{width:100%;padding:13px 40px 13px 42px;font-size:16px;border:1.5px solid var(--line);
       border-radius:12px;background:#fff;outline:none;}
  .searchbox input:focus{border-color:var(--accent);}
  .searchbox .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:17px;}
  .searchbox .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#e9eef3;
       color:#5b6b7b;width:26px;height:26px;border-radius:50%;font-size:15px;cursor:pointer;display:none;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
  .chip{font-size:12.5px;padding:6px 11px;border-radius:20px;border:1.5px solid var(--line);
        background:#fff;color:var(--sub);cursor:pointer;white-space:nowrap;}
  .chip.on{color:#fff;border-color:transparent;}
  .chip[data-f="all"].on{background:var(--accent);}
  .chip[data-f="ちば北西指令"].on{background:var(--hokusei);}
  .chip[data-f="ちば共同指令"].on{background:var(--kyodo);}
  .chip[data-f="船橋市消防（独自）"].on{background:var(--funabashi);}
  .chip[data-f="茨城消防本部"].on{background:var(--ibaraki);}
  .list{margin-top:6px;}
  .grp{font-size:12px;color:var(--sub);font-weight:700;margin:16px 4px 6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;
        margin-bottom:8px;display:flex;align-items:center;gap:11px;}
  .bar{width:4px;align-self:stretch;border-radius:4px;flex:none;}
  .bar.ちば北西指令{background:var(--hokusei)} .bar.ちば共同指令{background:var(--kyodo)}
  .bar.船橋市消防（独自）{background:var(--funabashi)} .bar.茨城消防本部{background:var(--ibaraki)}
  .info{flex:1;min-width:0;}
  .nm{font-size:15.5px;font-weight:700;line-height:1.35;}
  .nm mark{background:#fff3b0;color:inherit;border-radius:3px;padding:0 1px;}
  .ym{font-size:12px;color:var(--sub);margin-top:2px;}
  .meta{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:#eef2f6;color:#4a5a6a;}
  .tag.shi{background:#e7eef7;color:#2f5780;}
  .empty{text-align:center;color:var(--sub);padding:50px 10px;font-size:14px;}
  .hint{font-size:11.5px;color:var(--sub);margin-top:4px;padding-left:2px;}
</style>
</head>
<body>
<header>
  <h1>救急隊 検索<span class="cnt" id="cnt"></span></h1>
  <div class="searchbox">
    <span class="ic">🔍</span>
    <input id="q" type="search" inputmode="search" placeholder="名称・よみ・市町村で検索（例: 佐原 / さわら / 市川）" autocomplete="off">
    <button class="clr" id="clr">×</button>
  </div>
  <div class="filters" id="filters">
    <span class="chip on" data-f="all">すべて</span>
    <span class="chip" data-f="ちば北西指令">北西</span>
    <span class="chip" data-f="ちば共同指令">共同</span>
    <span class="chip" data-f="船橋市消防（独自）">船橋</span>
    <span class="chip" data-f="茨城消防本部">茨城</span>
  </div>
  <div class="hint">漢字でも ひらがな でも検索できます</div>
</header>
<div class="wrap">
  <div class="list" id="list"></div>
</div>

const SHIREI_LABEL = {"ちば北西指令":"北西","ちば共同指令":"共同","船橋市消防（独自）":"船橋","茨城消防本部":"茨城"};
const kataToHira = s => s.replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0)-0x60));
const norm = s => kataToHira((s||"").toString().toLowerCase()).replace(/\s+/g,"").replace(/[ヶヶ]/g,"ケ");
DATA.forEach(d=>{ d._h = norm(d.name+d.yomi+d.shi+d.ken+d.shirei); });

let filter="all", query="";
const listEl=document.getElementById("list"), cntEl=document.getElementById("cnt");
const qEl=document.getElementById("q"), clrEl=document.getElementById("clr");

function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function hi(name){
  if(!query) return esc(name);
  const nn=norm(name), nq=norm(query); const i=nn.indexOf(nq);
  if(i<0) return esc(name);
  // 正規化のずれを避け、元文字列上で素朴にハイライト（前方一致部分）
  let out="",qi=0,started=-1,cnt=0;
  // 単純化: 元名称を1文字ずつ正規化対応させる
  const map=[]; let acc="";
  for(let k=0;k<name.length;k++){ acc=norm(name.slice(0,k+1)); map.push(acc.length); }
  let s=-1,e=-1; const target=nn.indexOf(nq);
  if(target>=0){
    for(let k=0;k<name.length;k++){ const prev=k===0?0:map[k-1]; if(prev<=target&&target<map[k]){s=k;break;} }
    const end=target+nq.length;
    for(let k=0;k<name.length;k++){ if(map[k]>=end){e=k;break;} }
    if(s>=0&&e>=s) return esc(name.slice(0,s))+"<mark>"+esc(name.slice(s,e+1))+"</mark>"+esc(name.slice(e+1));
  }
  return esc(name);
}

function render(){
  const nq=norm(query);
  let rows=DATA.filter(d=>(filter==="all"||d.shirei===filter)&&(!nq||d._h.includes(nq)));
  cntEl.textContent="（"+rows.length+"件）";
  if(!rows.length){ listEl.innerHTML='<div class="empty">該当なし<br>別の語で試してください</div>'; return; }
  let html="", cur="";
  rows.forEach(d=>{
    if(d.shirei!==cur){ cur=d.shirei; html+='<div class="grp">'+esc(cur)+'</div>'; }
    html+='<div class="card"><div class="bar '+d.shirei+'"></div><div class="info">'+
      '<div class="nm">'+hi(d.name)+'</div>'+
      '<div class="ym">'+esc(d.yomi)+'</div>'+
      '<div class="meta"><span class="tag">'+esc(d.ken)+'</span>'+
      '<span class="tag shi">'+esc(d.shi)+'</span>'+
      '<span class="tag">'+esc(SHIREI_LABEL[d.shirei]||d.shirei)+'</span></div>'+
      '</div></div>';
  });
  listEl.innerHTML=html;
}
qEl.addEventListener("input",e=>{ query=e.target.value; clrEl.style.display=query?"block":"none"; render(); });
clrEl.addEventListener("click",()=>{ query=""; qEl.value=""; clrEl.style.display="none"; qEl.focus(); render(); });
document.getElementById("filters").addEventListener("click",e=>{
  const c=e.target.closest(".chip"); if(!c) return;
  filter=c.dataset.f;
  document.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x===c));
  render();
});
render();
